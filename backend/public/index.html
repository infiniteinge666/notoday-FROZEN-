<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eaf0ff" />
  <title>NoToday</title>

  <link rel="stylesheet" href="styles/render-style.css?v=11" />
</head>

<body>
  <main class="screen">

    <header class="hero" aria-label="NoToday header">
      <div class="brand">
        <img
          src="assets/notoday-shield.png"
          alt="NoToday"
          class="shield"
          loading="eager"
          decoding="async"
        />
      </div>

      <h1 class="title">NOTODAY</h1>
      <p class="subtitle">Real-Time Threat Detection</p>
    </header>

    <section class="slab" id="slab" data-band="SAFE" aria-label="Scan input">
      <div class="result" id="result">
        <div class="result-left">
          <div class="band" id="band">SAFE</div>
          <div class="score" id="score">0 / 100</div>
        </div>
        <div class="hint" id="hint">No threats detected in this message.</div>
      </div>

      <textarea
        id="input"
        placeholder="Paste a message, link, or email..."
        aria-label="Paste content to scan"
        spellcheck="false"
      ></textarea>
    </section>

    <div class="action">
      <button id="scanBtn" type="button" class="scanBtn" aria-label="Scan">
        <img src="assets/notoday-shield.png" alt="" class="scanBtnIcon" aria-hidden="true" />
        <span class="scanText">SCAN</span>
      </button>
    </div>

  </main>

  <script src="app.js?v=10"></script>
</body>
</html>

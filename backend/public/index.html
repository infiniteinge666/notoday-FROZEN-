<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NoToday — Proof Build</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="card">
      <h1>NoToday</h1>
      <p class="muted">Render proof build — one platform, one reality.</p>
      <p id="intel" class="muted">Loading intel…</p>
    </header>

    <main class="card">
      <label for="raw"><strong>Paste message / link / email text</strong></label>
      <textarea id="raw" rows="8" placeholder="Paste content here…"></textarea>
      <div class="row">
        <button id="scan">Scan</button>
        <button id="otp">Test OTP</button>
      </div>
      <pre id="out" class="out"></pre>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>

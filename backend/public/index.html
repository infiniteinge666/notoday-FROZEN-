<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NoToday</title>
  <link rel="stylesheet" href="/styles/render-style.css?v=1" />
</head>

<body>
  <main class="screen">

    <header class="brand">
      <img src="/assets/notoday-shield.png" alt="NoToday" class="shield" />
      <h1 class="title">NOTODAY</h1>
      <p class="subtitle">Risk check. Plain language. No storage.</p>
    </header>

    <section class="slab" id="slab" data-band="IDLE">
      <div class="result" id="result" hidden>
        <div class="result-left">
          <div class="band" id="band">SAFE</div>
          <div class="score" id="score">0 / 100</div>
        </div>
        <div class="hint" id="hint">No risk markers detected.</div>
      </div>

      <textarea
        id="input"
        placeholder="Paste a message, link, or email…"
        spellcheck="false"
      ></textarea>

      <div class="slab-foot">
        <div class="notice"><strong>Privacy:</strong> Nothing you paste is stored.</div>
        <div class="notice soft"><strong>Never paste</strong> OTPs / PINs / CVV.</div>
      </div>
    </section>

    <footer class="action">
      <button id="scanBtn" class="scan" type="button">SCAN</button>
      <div class="tiny-row">
        <button id="clearBtn" class="ghost" type="button">Clear</button>
        <a class="ghost" href="/intel" target="_blank" rel="noopener">Intel</a>
      </div>
    </footer>

  </main>

  <script src="/app.js?v=1"></script>
</body>
</html>

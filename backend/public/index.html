<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NoToday</title>

  <link rel="stylesheet" href="styles/render-style.css" />
</head>

<body>
  <main class="screen">
    <!-- Brand stack -->
    <header class="hero" aria-label="NoToday header">
      <img
        src="assets/notoday-shield.png"
        alt="NoToday shield"
        class="shield"
        draggable="false"
      />

      <h1 class="title">NOTODAY</h1>
      <p class="subtitle">Real-Time Threat Detection</p>
    </header>

    <!-- Slab -->
    <section class="slab" id="slab" data-band="SAFE" aria-label="Scan input">
      <!-- Result bar (always visible like mockup) -->
      <div class="result" id="result">
        <div class="result-left">
          <div class="band" id="band">SAFE</div>
          <div class="score" id="score">0 / 100</div>
        </div>
        <div class="hint" id="hint">No threats detected in this message.</div>
      </div>

      <!-- Inner input panel -->
      <div class="panel">
        <textarea
          id="input"
          placeholder="Paste a message, link, or email..."
          aria-label="Paste a message, link, or email"
          spellcheck="false"
        ></textarea>
      </div>

      <!-- warm glow like mockup base line -->
      <div class="slab-glow" aria-hidden="true"></div>
    </section>

    <!-- Primary action -->
    <div class="action">
      <button id="scanBtn" class="scan-btn" type="button" aria-label="Scan">
        <span class="scan-icon" aria-hidden="true"></span>
        <span class="scan-text">SCAN</span>
      </button>
      <div class="btn-glow" aria-hidden="true"></div>
    </div>

    <!-- Tiny footer (optional, invisible-ish) -->
    <footer class="foot" aria-hidden="true"></footer>
  </main>

  <script src="app.js"></script>
</body>
</html>

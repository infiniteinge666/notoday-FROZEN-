<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>NoToday</title>

  <link rel="icon" href="/assets/notoday-shield.png" />
  <link rel="stylesheet" href="/styles/render-style.css" />
</head>

<body>
  <main class="screen">
    <header class="brand" aria-label="NoToday">
      <img class="shield" src="/assets/notoday-shield.png" alt="NoToday Shield" />
      <div class="title">NOTODAY</div>
      <div class="subtitle">Real-Time Threat Detection</div>
    </header>

    <section id="slab" class="slab" data-band="SAFE" aria-label="Scanner">
      <div class="result" role="status" aria-live="polite">
        <div class="result-left">
          <div id="band" class="band">SAFE</div>
          <div id="threats" class="score">0 Threats</div>
        </div>

        <div id="hint" class="hint">No threats detected in this message.</div>
      </div>

      <div id="inputShell" class="input-shell">
        <textarea
          id="input"
          placeholder="Paste a message, link, email, or screenshot..."
          autocapitalize="off"
          autocomplete="off"
          spellcheck="false"
        ></textarea>

        <div class="paste-row">
          <div id="pasteHint" class="paste-hint">
            Paste text or press Ctrl+V with a screenshot copied.
          </div>
          <div id="ocrStatus" class="ocr-status" aria-live="polite"></div>
        </div>
      </div>

      <div class="slab-foot">
        <div class="notice">
          <strong>Privacy:</strong> Nothing you paste is stored.
        </div>
        <div class="notice soft">
          Never paste <strong>OTPs</strong> / <strong>PINs</strong> / <strong>CVV</strong>.
        </div>
      </div>
    </section>

    <footer class="action">
      <button id="scanBtn" class="scan" type="button">
        <span class="scan-icon" aria-hidden="true"></span>
        <span class="scan-label">SCAN</span>
      </button>

      <div class="tiny-row">
        <button id="clearBtn" class="ghost" type="button">Clear</button>
        <button id="uploadBtn" class="ghost" type="button">Screenshot</button>
        <a id="intelBtn" class="ghost" href="/intel" target="_blank" rel="noopener">Intel</a>
      </div>

      <input
        id="imageInput"
        type="file"
        accept="image/png,image/jpeg,image/jpg,image/webp"
        hidden
      />
    </footer>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>

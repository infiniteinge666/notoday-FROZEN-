<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NoToday Scanner</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="nt-container">

<header class="nt-header">

<div class="nt-logo">
🛡️ NoToday
</div>

</header>

<main class="nt-scanner">

<textarea
id="scanInput"
class="nt-input"
placeholder="Paste suspicious message or link here">
</textarea>

<div class="nt-actions">

<button id="cameraBtn" class="nt-btn-circle">
📷
</button>

<input
type="file"
id="imageUpload"
accept="image/*"
capture="environment"
style="display:none"
/>

<button id="uploadBtn" class="nt-btn-soft">
Upload Screenshot
</button>

</div>

<button id="scanBtn" class="nt-btn-primary">
Scan
</button>

<div id="result" class="nt-card nt-result">

<div class="band">READY</div>
<div class="score">Awaiting scan</div>

</div>

</main>

</div>

<script src="app.js"></script>

</body>
</html>

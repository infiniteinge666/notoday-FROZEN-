<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>NoToday</title>
  <link rel="icon" href="/assets/notoday-shield.png" />
  <link rel="stylesheet" href="/styles/render-style.css" />
</head>

<body>
  <main class="nt-shell">
    <section class="nt-app" aria-label="NoToday scanner">
      <header class="nt-header">
        <img
          src="/assets/notoday-shield.png"
          alt="NoToday shield logo"
          class="nt-logo"
          onerror="this.style.display='none'"
        />
        <h1 class="nt-title">NOTODAY</h1>
        <p class="nt-subtitle">Check before you trust.</p>
      </header>

      <section class="nt-status-card" id="resultCard" aria-live="polite">
        <div class="nt-status-top">
          <div class="nt-band-wrap">
            <span class="nt-band" id="bandLabel">READY</span>
            <span class="nt-score" id="scoreLabel">Waiting for input</span>
          </div>
        </div>

        <div class="nt-reason" id="reasonText">
          Upload a screenshot from Photos or paste a suspicious message.
        </div>

        <div class="nt-why" id="whyText"></div>
      </section>

      <section class="nt-input-card">
        <label for="scanInput" class="sr-only">Paste message or link</label>

        <div
          id="previewWrap"
          class="nt-preview-wrap hidden"
          aria-live="polite"
        >
          <div class="nt-preview-head">
            <span class="nt-preview-badge">Screenshot uploaded ✓</span>
            <span class="nt-preview-meta" id="previewMeta">Ready to scan</span>
          </div>

          <img
            id="previewImage"
            class="nt-preview-image"
            alt="Uploaded screenshot preview"
          />
        </div>

        <textarea
          id="scanInput"
          class="nt-textarea"
          placeholder="Paste a message, link, email, or screenshot text here..."
          autocapitalize="sentences"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          rows="7"
        ></textarea>

        <div class="nt-input-help" id="inputHelp">
          Paste text here, or tap <strong>Screenshot</strong> to choose from Photos.
        </div>

        <div class="nt-privacy">
          <strong>Privacy:</strong> Nothing you paste or upload is stored.
          <br />
          Never paste <strong>OTPs / PINs / CVV</strong>.
        </div>
      </section>

      <div class="nt-primary-actions">
        <button id="scanBtn" class="nt-btn nt-btn-primary" disabled>
          <span class="nt-btn-icon">🛡️</span>
          <span>SCAN</span>
        </button>
      </div>

      <div class="nt-secondary-actions">
        <button id="uploadBtn" class="nt-btn nt-btn-secondary">
          Screenshot
        </button>

        <button id="clearBtn" class="nt-btn nt-btn-secondary">
          Clear
        </button>
      </div>

      <div class="nt-tertiary-actions">
        <button id="intelBtn" class="nt-btn nt-btn-ghost">
          Intel
        </button>
      </div>

      <input
        type="file"
        id="imageUpload"
        accept="image/*"
        capture="environment"
        hidden
      />
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NoToday Scanner</title>

<link rel="stylesheet" href="/styles/render-style.css">

</head>

<body>

<div class="app">

<header class="header">
<h1>NoToday</h1>
<p class="tagline">Check messages before you trust them.</p>
</header>

<main class="scanner">

<textarea
id="inputText"
placeholder="Paste a message, email, or suspicious text here..."
></textarea>

<div class="actions">

<button id="scanBtn" class="primary">
SCAN
</button>

<button id="pasteBtn" class="ghost">
PASTE TEXT
</button>

<button id="uploadBtn" class="ghost">
UPLOAD SCREENSHOT
</button>

<button id="clearBtn" class="ghost">
CLEAR
</button>

<input
type="file"
id="imageInput"
accept="image/*"
style="display:none"
/>

</div>

<div id="resultBox" class="result hidden">

<div id="band" class="band"></div>

<div id="score"></div>

<ul id="reasons"></ul>

</div>

</main>

<footer class="footer">
<p>Pause before you act.</p>
</footer>

</div>

<script src="/app.js"></script>

</body>

</html>
